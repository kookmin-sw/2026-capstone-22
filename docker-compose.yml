services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: readytalk-backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-readytalk_user}:${POSTGRES_PASSWORD:-readytalk_password}@${POSTGRES_HOST:-34.64.204.33}:5432/${POSTGRES_DB:-readytalk_db}
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - SUPERADMIN_EMAIL=${SUPERADMIN_EMAIL:-admin@academy.ready.talk}
      - SUPERADMIN_PASSWORD=${SUPERADMIN_PASSWORD:-readytalk2026!}
      - FEEDBACK_EMAIL=${FEEDBACK_EMAIL:-}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - API_ENCRYPTION_KEY=${API_ENCRYPTION_KEY:-}
      - GOOGLE_CALENDAR_CLIENT_ID=${GOOGLE_CALENDAR_CLIENT_ID:-}
      - GOOGLE_CALENDAR_CLIENT_SECRET=${GOOGLE_CALENDAR_CLIENT_SECRET:-}
      - GOOGLE_CALENDAR_REDIRECT_URI=${GOOGLE_CALENDAR_REDIRECT_URI:-http://localhost:8888/api/calendar/callback}
      - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:8888}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/credentials/readytalk-kmu-credentials.json
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
      - ./backend/credentials:/app/credentials:ro
    expose:
      - "8000"
    command: >
      sh -c "alembic upgrade head &&
             gunicorn app.main:app -w ${GUNICORN_WORKERS:-2} -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --reload --timeout 600 --graceful-timeout 30 --forwarded-allow-ips='*'"

  nginx:
    image: nginx:alpine
    container_name: readytalk-nginx
    restart: always
    volumes:
      - ./nginx/backend.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8888:80"
    depends_on:
      - backend
      - frontend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: readytalk-frontend
    restart: always
    environment:
      - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost}
      - WDS_SOCKET_HOST=localhost
      - WDS_SOCKET_PORT=8888
      - WDS_SOCKET_PATH=/ws
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    expose:
      - "3000"
    depends_on:
      - backend
    stdin_open: true
    tty: true

