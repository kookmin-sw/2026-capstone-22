# Rate Limiting 설정
# 사용자 IP당 초당 10개 요청 허용 (burst 20개까지 대기열)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# 채팅 API는 더 느슨하게 (Gemini API 응답 대기 시간 고려)
limit_req_zone $binary_remote_addr zone=chat_limit:10m rate=5r/s;

# 동시 연결 수 제한 (IP당 최대 20개)
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Cloudflare 등 리버스 프록시의 X-Forwarded-Proto 헤더를 사용
# SSL이 외부에서 종료되는 경우 $scheme은 항상 http이므로 원본 프로토콜을 전달
map $http_x_forwarded_proto $forwarded_proto {
    default $scheme;
    https   https;
}

upstream backend {
    server backend:8000;
    keepalive 32;
}

upstream frontend {
    server frontend:3000;
    keepalive 4;
}

# Main application
server {
    listen 80 default_server;
    server_name _;

    # 요청 본문 크기 (파일 업로드 대응)
    client_max_body_size 100m;

    # 프록시 버퍼 설정
    proxy_buffer_size 16k;
    proxy_buffers 8 32k;
    proxy_busy_buffers_size 64k;

    # Gzip 압축
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # 보안 헤더
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # KakaoTalk 오픈빌더 스킬 (Rate Limit 없음 - 카카오 서버에서 호출)
    location /api/kakao {
        proxy_pass http://backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_read_timeout 60s;
        proxy_send_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # 채팅 API (Rate Limit 느슨하게)
    location /api/chat {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept';
            add_header 'Access-Control-Max-Age' 86400;
            return 204;
        }

        limit_req zone=chat_limit burst=10 nodelay;
        limit_conn conn_limit 20;

        proxy_pass http://backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Gemini API 응답 대기 (최대 120초)
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # 파일 업로드 API (타임아웃 길게)
    location /api/corpus {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept';
            add_header 'Access-Control-Max-Age' 86400;
            return 204;
        }

        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 20;

        proxy_pass http://backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # 파일 업로드는 시간이 오래 걸릴 수 있음
        proxy_read_timeout 300s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # 그 외 모든 API (/api/auth, /api/admin, /api/models 등)
    location /api {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept';
            add_header 'Access-Control-Max-Age' 86400;
            return 204;
        }

        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 20;

        proxy_pass http://backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_read_timeout 60s;
        proxy_send_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # 헬스체크
    location /health {
        proxy_pass http://backend;
        proxy_set_header Host $http_host;
    }

    # FastAPI Swagger 문서
    location /docs {
        proxy_pass http://backend;
        proxy_set_header Host $http_host;
    }

    location /openapi.json {
        proxy_pass http://backend;
        proxy_set_header Host $http_host;
    }

    # Frontend (React - 챗봇 UI + 관리자 페이지)
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# Weaviate proxy (for Vertex AI RAG Engine hybrid search)
server {
    listen 80;
    server_name weaviate-kmu.ready.talk;

    location / {
        proxy_pass http://weaviate:8080;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_connect_timeout 5s;
    }
}
